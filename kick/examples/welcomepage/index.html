<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Hero & Horizontal Scroll</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Hero Section with Canvas -->
  <header class="hero">
    <canvas id="hero-canvas"></canvas>
    <h1>Welcome to Our Site</h1>
    <p>Enjoy the particle animation and scroll horizontally.</p>
  </header>

  <!-- Horizontal Scrolling Sections -->
  <div class="horizontal-scroll">
    <section class="section" id="section1">
      <h2>Section 1</h2>
      <p>This is the first section. Scroll horizontally to discover more.</p>
    </section>
    <section class="section" id="section2">
      <h2>Section 2</h2>
      <p>Here is the second section. Keep scrolling!</p>
    </section>
    <section class="section" id="section3">
      <h2>Section 3</h2>
      <p>Final section. Thanks for visiting.</p>
    </section>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
